<body class="bg-zinc-950 text-zinc-100 h-screen flex flex-col overflow-hidden">

<div id="app" class="flex flex-col h-full">
  <header id="header" class="safe-top shrink-0 px-4 pb-3 bg-zinc-950/95 backdrop-blur border-b border-zinc-900 flex items-center justify-between gap-2"></header>
  <main id="content" class="flex-1 overflow-y-auto px-4 pb-6"></main>

  <nav id="bottomNav" class="safe-bottom shrink-0 border-t border-zinc-900 bg-zinc-950/95 backdrop-blur flex relative z-20 px-1.5 pt-1">
    <button data-action="switch-tab" data-tab="workout" class="nav-btn tap flex-1 flex flex-col items-center gap-1 py-3 mx-0.5 rounded-2xl">
      <i data-lucide="dumbbell" class="w-6 h-6"></i><span class="text-[11px] font-semibold" data-nav-label="navWorkout"></span>
    </button>
    <button data-action="switch-tab" data-tab="schedule" class="nav-btn tap flex-1 flex flex-col items-center gap-1 py-3 mx-0.5 rounded-2xl">
      <i data-lucide="calendar-days" class="w-6 h-6"></i><span class="text-[11px] font-semibold" data-nav-label="navSchedule"></span>
    </button>
    <button data-action="switch-tab" data-tab="records" class="nav-btn tap flex-1 flex flex-col items-center gap-1 py-3 mx-0.5 rounded-2xl">
      <i data-lucide="trophy" class="w-6 h-6"></i><span class="text-[11px] font-semibold" data-nav-label="navRecords"></span>
    </button>
    <button data-action="switch-tab" data-tab="photos" class="nav-btn tap flex-1 flex flex-col items-center gap-1 py-3 mx-0.5 rounded-2xl">
      <i data-lucide="image" class="w-6 h-6"></i><span class="text-[11px] font-semibold" data-nav-label="navPhotos"></span>
    </button>
  </nav>

  <input id="exerciseImageInput" type="file" accept="image/*" class="hidden" />
  <div id="fabHost"></div>
  <div id="timerHost"></div>
  <div id="modalHost"></div>
  <div id="toastHost" class="safe-toast-top pointer-events-none fixed left-1/2 z-50"></div>

  <div id="gateHost" class="fixed inset-0 z-[60] bg-zinc-950 flex items-center justify-center">
    <div class="w-8 h-8 border-2 border-zinc-700 border-t-emerald-400 rounded-full animate-spin"></div>

</div>

  function normalizeState(parsed){
    if (!parsed || !parsed.schedule || !Array.isArray(parsed.sessions)) return null;
    if (!parsed.exerciseImages) parsed.exerciseImages = {};
    if (!parsed.exerciseNotes) parsed.exerciseNotes = {};
    if (!parsed.dayTemplates) parsed.dayTemplates = [];
    if (!parsed.photos) parsed.photos = [];
    if (!parsed.timerSettings) parsed.timerSettings = { defaultSeconds: 90, skipPrompt: false, enabled: true };
    if (typeof parsed.timerSettings.enabled !== "boolean") parsed.timerSettings.enabled = true;
    // Discard any legacy weekday-keyed schedule (mon/tue/...) from the old weekly-template system.
    DAY_KEYS.forEach(k => { if (parsed.schedule[k] && "active" in parsed.schedule[k]) delete parsed.schedule[k]; });
    return parsed;
  }

  function loadState(){
    try {

      if (raw) {
        const normalized = normalizeState(JSON.parse(raw));
        if (normalized) return normalized;
      }
    } catch(e) {}
    return defaultState();
  }

  /* ---------------------------------------------------------------------
     Cloud Sync (Supabase)
  --------------------------------------------------------------------- */
  function scheduleCloudSync(){
    if (!sb || !supaUser) return;
    clearTimeout(syncTimer);
    syncTimer = setTimeout(pushStateToCloud, 900);
  }

  async function pushStateToCloud(){
    if (!sb || !supaUser) return;
    syncStatus = "syncing";
    try {
      const { error } = await sb.from("user_data").upsert({
        user_id: supaUser.id, data: state, updated_at: new Date().toISOString()
      });
      syncStatus = error ? "error" : "synced";
    } catch(e){ syncStatus = "error"; }
    if (ui.settingsOpen) renderSettingsModal();
  }

  async function pullStateFromCloud(){
    if (!sb || !supaUser) return;
    syncStatus = "syncing";
    try {
      const { data, error } = await sb.from("user_data").select("data").eq("user_id", supaUser.id).maybeSingle();
      if (error) throw error;
      if (data && data.data){
        const normalized = normalizeState(data.data);
        if (normalized){ state = normalized; localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      } else {
        await pushStateToCloud();
      }
      syncStatus = "synced";
    } catch(e){ syncStatus = "error"; }
    render();
    renderTimer();
    if (ui.settingsOpen) renderSettingsModal();
  }

  async function initAuth(){
    if (!sb){ renderGate(); return; }
    try {
      const { data: { session } } = await sb.auth.getSession();
      supaUser = session ? session.user : null;
      if (supaUser) await pullStateFromCloud();
    } catch(e) {}
    renderGate();
    sb.auth.onAuthStateChange((event, session) => {
      supaUser = session ? session.user : null;
      if (event === "SIGNED_IN"){ pullStateFromCloud(); renderGate(); }
      if (event === "SIGNED_OUT") renderGate();
      if (ui.settingsOpen) renderSettingsModal();
    });
  }

  async function submitAuth(){
    if (!sb) return;
    const isSignup = ui.auth.mode === "signup";
    const email = ((document.getElementById("authEmail")||{}).value || "").trim();
    const password = (document.getElementById("authPassword")||{}).value || "";
    const firstName = isSignup ? ((document.getElementById("authFirstName")||{}).value || "").trim() : "";
    const lastName = isSignup ? ((document.getElementById("authLastName")||{}).value || "").trim() : "";
    const birthDate = isSignup ? ((document.getElementById("authBirthDate")||{}).value || "") : "";
    const password2 = isSignup ? ((document.getElementById("authPassword2")||{}).value || "") : "";

    if (!email || !password || (isSignup && !firstName)){ ui.auth.error = T.authFillBoth; renderGate(); return; }
    if (isSignup && password !== password2){ ui.auth.error = T.authPasswordMismatch; renderGate(); return; }

    ui.auth.busy = true; ui.auth.error = ""; renderGate();
    try {
      if (isSignup){
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { first_name: firstName, last_name: lastName, birth_date: birthDate } }
        });
        if (error) throw error;
        ui.auth.busy = false;
        if (data.session){
          sound("select");
        } else {
          showToast(T.authCheckEmail, "pr");
        }
        renderGate();
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        ui.auth.busy = false;
        sound("select");
        renderGate();
      }
    } catch(e){
      ui.auth.busy = false;
      ui.auth.error = e.message || String(e);
      renderGate();
    }
  }

  function toggleAuthMode(){
    ui.auth.mode = ui.auth.mode === "signin" ? "signup" : "signin";
    ui.auth.error = "";
    sound("tap");
    renderGate();
  }

  async function signOutCloud(){
    if (!sb) return;
    if (!confirm(T.confirmSignOut)) return;
    await sb.auth.signOut();
    supaUser = null;
    sound("tap");
    closeSettings();
    renderGate();

  /* ---------------------------------------------------------------------
     Date / Format Helpers
  --------------------------------------------------------------------- */
  function addDays(date, n){ const d = new Date(date); d.setDate(d.getDate()+n); return d; }
  function dateStr(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function todayStr(){ return dateStr(new Date()); }
  function mondayOf(date){ const d = new Date(date); d.setHours(0,0,0,0); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d; }

  function fmtDateLabel(ds){
    const today = todayStr();
    const yesterday = dateStr(addDays(new Date(), -1));
    if (ds === today) return T.today;
    if (ds === yesterday) return T.yesterday;
    const d = new Date(ds + "T00:00:00");
    return d.toLocaleDateString(LOCALE_TAGS[lang], { day: "numeric", month: "short" });
  }

  function todayLongLabel(){
    return new Date().toLocaleDateString(LOCALE_TAGS[lang], { weekday: "long", day: "numeric", month: "long" });
  }

  function dayName(idx){ return DAY_NAMES[lang][idx]; }
  function shortDayName(idx){
    const ref = new Date(2024, 0, 1 + idx); // 2024-01-01 is a Monday
    const s = new Intl.DateTimeFormat(LOCALE_TAGS[lang], { weekday: "short" }).format(ref);
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function epley(weight, reps){ return weight * (1 + reps/30); }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function vibrate(ms){ try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {} }

  function pulse(el){
    if (!el) return;
    el.classList.remove("num-pulse");
    void el.offsetWidth;
    el.classList.add("num-pulse");
  }

  /* --------------------------- Sound engine --------------------------- */
  let audioCtx = null;
  function getAudioCtx(){
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioCtx = new Ctx();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, duration, type, gain, delay, glideTo){
    if (!ui.soundEnabled || ui.soundVolume <= 0) return;
    try {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const t0 = ctx.currentTime + (delay || 0);
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      const scaledGain = Math.max(0.0001, gain * ui.soundVolume);
      osc.type = type || "sine";
      osc.frequency.setValueAtTime(freq, t0);
      if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0 + duration);
      gainNode.gain.setValueAtTime(0.0001, t0);
      gainNode.gain.exponentialRampToValueAtTime(scaledGain, t0 + 0.008);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gainNode).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.03);
    } catch(e) {}
  }

  function sound(name){
    if (!ui.soundEnabled) return;
    switch(name){
      case "tap": playTone(700, 0.045, "sine", 0.07); break;
      case "step": playTone(520, 0.035, "triangle", 0.08); break;
      case "select": playTone(640, 0.05, "sine", 0.08); break;
      case "delete": playTone(260, 0.06, "triangle", 0.08, 0, 150); break;
      case "log": playTone(320, 0.1, "sine", 0.15, 0, 500); break;
      case "pr":
        playTone(523.25, 0.09, "sine", 0.14, 0);
        playTone(659.25, 0.09, "sine", 0.14, 0.09);
        playTone(783.99, 0.18, "sine", 0.16, 0.18);
        break;
      case "timerDone":
        playTone(880, 0.15, "sine", 0.16, 0);
        playTone(1108.73, 0.22, "sine", 0.14, 0.12);
        break;
    }
  }

  function toggleAppSound(){
    ui.soundEnabled = !ui.soundEnabled;
    localStorage.setItem(SOUND_KEY, ui.soundEnabled ? "on" : "off");
    if (ui.soundEnabled) sound("tap");
    renderSettingsModal();
  }

  function setSoundVolume(value){
    ui.soundVolume = Math.min(1, Math.max(0, value));
    localStorage.setItem(SOUND_VOLUME_KEY, String(ui.soundVolume));
  }

  /* ---------------------------------------------------------------------
     Workout Data Helpers
  --------------------------------------------------------------------- */
  function getSession(ds, create){
    let s = state.sessions.find(x => x.date === ds);
    if (!s && create){ s = { id: uid(), date: ds, sets: [] }; state.sessions.push(s); }
    return s;
  }

  function allSets(){
    const out = [];
    for (const s of state.sessions) for (const st of s.sets) out.push({ ...st, date: s.date, sessionId: s.id });
    return out;
  }

  function allLoggedExerciseNames(){
    const set = new Set();
    allSets().forEach(s => set.add(s.exercise));
    return [...set];
  }

  function exerciseSides(exercise){
    const sets = allSets().filter(s => s.exercise === exercise);
    const sides = new Set(sets.map(s => s.side || null));
    return [...sides];
  }

  function bestFor(exercise, side){
    const sets = allSets().filter(s => s.exercise === exercise && (s.side || null) === (side || null));
    if (!sets.length) return null;
    let maxWeight = sets[0], maxEpley = sets[0], maxEpleyVal = epley(sets[0].weight, sets[0].reps);
    for (const s of sets){
      if (s.weight > maxWeight.weight) maxWeight = s;
      const e = epley(s.weight, s.reps);
      if (e > maxEpleyVal){ maxEpleyVal = e; maxEpley = s; }
    }
    return { maxWeight, maxEpley, maxEpleyVal };
  }

  function setBadges(exercise, setObj){
    const best = bestFor(exercise, setObj.side || null);
    if (!best) return { isWeightPR: false, isEpleyPR: false };
    return { isWeightPR: best.maxWeight.id === setObj.id, isEpleyPR: best.maxEpley.id === setObj.id };
  }

  function lastSetFor(exercise, side){
    const sets = allSets().filter(s => s.exercise === exercise && (s.side || null) === (side || null))
      .sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time));
    return sets[0] || null;
  }

  function computeStreak(){
    let weeks = 0;
    let cursorMonday = addDays(mondayOf(new Date()), -7);
    let guard = 0;
    while (guard++ < 260){
      const weekDays = [0,1,2,3,4,5,6].map(i => addDays(cursorMonday, i));
      let hasActive = false, complete = true;
      for (let i=0;i<7;i++){
        const ds = dateStr(weekDays[i]);
        if (state.schedule[ds]){
          hasActive = true;
          const session = state.sessions.find(s => s.date === ds);
          if (!session || session.sets.length === 0){ complete = false; break; }
        }
      }
      if (hasActive && !complete) break;
      if (hasActive && complete) weeks++;
      cursorMonday = addDays(cursorMonday, -7);
    }
    return weeks;
  }

  function rpeHintText(v){
    v = parseFloat(v);
    if (v >= 10) return T.rpeHint10;
    if (v >= 9) return T.rpeHint9;
    if (v >= 8) return T.rpeHint8;
    if (v >= 7) return T.rpeHint7;
    if (v >= 5) return T.rpeHintModerate;
    return T.rpeHintEasy;
  }

  /* iOS Safari doesn't render native <datalist> suggestions, so we build our own dropdown. */
  function wireExerciseAutocomplete(inputId){
    const input = document.getElementById(inputId);
    if (!input) return;
    const wrapper = input.parentElement;
    let box = null;
    function closeBox(){ if (box){ box.remove(); box = null; } }
    function openBox(){
      closeBox();
      const q = input.value.trim().toLowerCase();
      if (!q) return;
      const matches = state.exercises.filter(e => e.toLowerCase().includes(q) && e.toLowerCase() !== q).slice(0, 6);
      if (!matches.length) return;
      box = document.createElement("div");
      box.className = "absolute left-0 right-0 top-full mt-1.5 z-10 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-2xl";
      box.innerHTML = matches.map(m => `<button type="button" data-suggestion="${escapeHtml(m)}" class="tap w-full text-start px-4 py-3 text-[15px] text-zinc-200 active:bg-zinc-800 border-b border-zinc-800 last:border-0">${escapeHtml(m)}</button>`).join("");
      wrapper.appendChild(box);
      box.querySelectorAll("[data-suggestion]").forEach(btn => {
        btn.addEventListener("mousedown", (e) => e.preventDefault());
        btn.addEventListener("click", () => {
          input.value = btn.dataset.suggestion;
          closeBox();
          input.focus();
        });
      });
    }
    input.addEventListener("input", openBox);
    input.addEventListener("focus", openBox);
    input.addEventListener("blur", () => setTimeout(closeBox, 150));
  }

  function quickAddExercise(){
    const input = document.getElementById("quickAddExerciseInput");
    if (!input) return;
    const name = input.value.trim();
    if (!name) { ui.workout.addingExercise = false; render(); return; }
    const todayKey = todayStr();
    if (!state.schedule[todayKey]) state.schedule[todayKey] = { exercises: [] };
    if (!state.schedule[todayKey].exercises.includes(name)) state.schedule[todayKey].exercises.push(name);
    if (!state.exercises.includes(name)) state.exercises.push(name);
    ui.workout.addingExercise = false;
    saveState(); sound("select"); render();
  }

  function lastSessionSummaryHtml(ex){
    const todayKey = todayStr();
    const past = allSets().filter(s => s.exercise === ex && s.date < todayKey);
    if (!past.length) return "";
    const lastDate = past.reduce((max, s) => s.date > max ? s.date : max, past[0].date);
    const sets = past.filter(s => s.date === lastDate).sort((a,b) => (a.time||"").localeCompare(b.time||""));
    const groups = [];
    const groupIndex = {};
    sets.forEach(s => {
      const gid = s.groupId || s.id;
      if (!(gid in groupIndex)){ groupIndex[gid] = groups.length; groups.push([]); }
      groups[groupIndex[gid]].push(s);
    });
    const rows = groups.map((items, i) => {
      const parts = items.map(s => {
        const sideTag = s.side ? (s.side === "left" ? T.leftLabel : T.rightLabel) + " " : "";
        return `${sideTag}${s.weight}кг × ${s.reps}`;
      }).join(" · ");
      return `<div class="flex items-center justify-between text-sm py-1.5 ${i>0?'border-t border-zinc-800':''}">
        <span class="text-zinc-500">${T.setWord} ${i+1}</span>
        <span class="text-zinc-200 font-semibold">${parts}</span>
      </div>`;
    }).join("");
    return `
    <div class="anim-pop mt-5 bg-zinc-900/60 border border-zinc-800 rounded-2xl px-4 py-3.5">
      <div class="text-[11px] font-bold tracking-wider text-zinc-500 mb-1">${T.lastSessionLabel} · ${fmtDateLabel(lastDate)}</div>
      ${rows}
    </div>`;
  }

  function logSet(){
    const ex = ui.workout.activeExercise;
    if (!ex) return;
    const rpe = ui.workout.rpeOpen ? ui.rpe : null;
    const session = getSession(todayStr(), true);
    const now = new Date();
    let anyPR = false;
    const toastMsgs = [];

    function commitOne(weight, reps, side, groupId){
      if (weight <= 0 || reps <= 0) return false;
      const prevBest = bestFor(ex, side);
      const newEpley = epley(weight, reps);
      const isWeightPR = !prevBest || weight > prevBest.maxWeight.weight;
      const isEpleyPR = !prevBest || newEpley > prevBest.maxEpleyVal;
      session.sets.push({ id: uid(), groupId: groupId || null, exercise: ex, weight, reps, side: side || null, rpe, time: now.toTimeString().slice(0,8) + "." + session.sets.length });
      if (isWeightPR && isEpleyPR) toastMsgs.push(T.prBoth(weight, reps, newEpley.toFixed(1)));
      else if (isWeightPR) toastMsgs.push(T.prWeight(weight));
      else if (isEpleyPR) toastMsgs.push(T.prEpley(newEpley.toFixed(1)));
      if (isWeightPR || isEpleyPR) anyPR = true;
      return true;
    }

    let logged = false;
    if (ui.workout.splitSides){
      const wL = parseFloat(document.getElementById("weightInputL").value) || 0;
      const rL = parseInt(document.getElementById("repsInputL").value) || 0;
      const wR = parseFloat(document.getElementById("weightInputR").value) || 0;
      const rR = parseInt(document.getElementById("repsInputR").value) || 0;
      const groupId = uid();
      const okL = commitOne(wL, rL, "left", groupId);
      const okR = commitOne(wR, rR, "right", groupId);
      logged = okL || okR;
    } else {
      const weight = parseFloat(document.getElementById("weightInput").value) || 0;
      const reps = parseInt(document.getElementById("repsInput").value) || 0;
      logged = commitOne(weight, reps, null);
    }

    if (!logged){ showToast(T.enterWeightReps, "warn"); return; }

    saveState();
    vibrate(anyPR ? [15,40,15] : 15);
    sound(anyPR ? "pr" : "log");
    render();
    toastMsgs.forEach((msg, i) => setTimeout(() => showToast(msg, "pr"), i * 400));

    if (!state.timerSettings.enabled) return;
    if (state.timerSettings.skipPrompt) startRestTimer(state.timerSettings.defaultSeconds);
    else openTimerPicker();
  }

  function deleteSet(sessionId, setId){
    const session = state.sessions.find(s => s.id === sessionId);
    if (!session) return;
    const ids = setId.split(",");
    session.sets = session.sets.filter(s => !ids.includes(s.id));
    if (session.sets.length === 0) state.sessions = state.sessions.filter(s => s.id !== sessionId);
    saveState(); sound("delete"); render();
  }

  /* ---------------------------------------------------------------------
     Schedule Tab — Monthly Calendar
  --------------------------------------------------------------------- */
  function renderScheduleCalendar(){
    const content = document.getElementById("content");
    const year = ui.schedule.viewYear, month = ui.schedule.viewMonth;
    const first = new Date(year, month, 1);
    const startOffset = (first.getDay() + 6) % 7;
    const daysInMo = daysInMonth(year, month);
    const totalCells = Math.ceil((startOffset + daysInMo) / 7) * 7;
    const todayIso = todayStr();
    const isRtl = RTL_LANGS.includes(lang);

    const monthLabel = first.toLocaleDateString(LOCALE_TAGS[lang], { month: "long", year: "numeric" });
    const weekdayHeader = DAY_KEYS.map((k,i) => `<div class="text-center text-[11px] font-bold text-zinc-600 py-1">${shortDayName(i)}</div>`).join("");

    let cells = "";
    for (let i = 0; i < totalCells; i++){
      const dayNum = i - startOffset + 1;
      if (dayNum < 1 || dayNum > daysInMo){ cells += `<div></div>`; continue; }
      const dateIso = year + "-" + String(month+1).padStart(2,"0") + "-" + String(dayNum).padStart(2,"0");
      const planned = !!state.schedule[dateIso];
      const session = state.sessions.find(s => s.date === dateIso);
      const completed = !!(session && session.sets.length);
      const isToday = dateIso === todayIso;
      const dot = completed ? `<div class="w-1.5 h-1.5 rounded-full bg-emerald-400"></div>` : planned ? `<div class="w-1.5 h-1.5 rounded-full bg-zinc-500"></div>` : `<div class="w-1.5 h-1.5"></div>`;
      cells += `
      <button data-action="open-day" data-date="${dateIso}" class="tap aspect-square flex flex-col items-center justify-center gap-1 rounded-2xl ${isToday ? "bg-emerald-500/15 ring-2 ring-emerald-500/50" : planned ? "bg-zinc-900" : ""}">
        <span class="text-[13px] font-semibold ${isToday ? "text-emerald-400" : planned ? "text-zinc-200" : "text-zinc-600"}">${dayNum}</span>
        ${dot}
      </button>`;
    }

    content.innerHTML = `
      <div class="flex items-center justify-between mb-4 pt-2">
        <button data-action="prev-month" class="tap w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-400 active:bg-zinc-800"><i data-lucide="${isRtl?"chevron-right":"chevron-left"}" class="w-5 h-5"></i></button>

      </div>
      <div class="grid grid-cols-7 gap-1 mb-1.5">${weekdayHeader}</div>
      <div class="grid grid-cols-7 gap-1.5">${cells}</div>
      <button data-action="open-quickfill" class="tap w-full flex items-center justify-center gap-2 mt-6 py-3.5 rounded-2xl bg-zinc-900 border border-zinc-800 text-zinc-300 font-bold text-sm active:bg-zinc-800">
        <i data-lucide="zap" class="w-4 h-4 text-emerald-400"></i> ${T.quickFillBtn}
      </button>
      <div class="flex items-center gap-4 mt-4 px-1 text-xs text-zinc-500">
        <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-zinc-500"></div> ${T.legendPlanned}</div>
        <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-emerald-400"></div> ${T.legendDone}</div>
      </div>`;
  }

  /* ---------------------------------------------------------------------
     Drag & Drop Reordering
  --------------------------------------------------------------------- */
  function startDrag(e, handle){
    const context = handle.dataset.context;
    let listRef, commit;
    if (context === "workout"){
      const key = todayStr();
      listRef = state.schedule[key].exercises;
      commit = (order) => { state.schedule[key].exercises = order; saveState(); render(); };
    } else if (context === "schedule"){
      const key = ui.schedule.activeDate;
      listRef = state.schedule[key].exercises;
      commit = (order) => { state.schedule[key].exercises = order; saveState(); render(); };
    } else return;

    const item = handle.closest("[data-drag-item]");
    const container = item.closest(".drag-list");
    if (!container) return;
    const items = Array.from(container.querySelectorAll("[data-drag-item]"));
    const startIndex = items.indexOf(item);
    const rect = item.getBoundingClientRect();
    const style = getComputedStyle(item);
    const marginBottom = parseFloat(style.marginBottom) || 0;
    const itemHeight = rect.height + marginBottom;

    dragCtx = { items, startIndex, currentIndex: startIndex, item, itemHeight, startY: e.clientY, listRef, commit };
    item.style.position = "relative";
    item.style.zIndex = "30";
    item.style.transition = "none";
    item.classList.add("shadow-2xl","ring-1","ring-emerald-500/40");
    vibrate(10);

    const move = (ev) => onDragMove(ev);
    const up = () => { onDragEnd(); document.removeEventListener("pointermove", move); document.removeEventListener("pointerup", up); };
    document.addEventListener("pointermove", move);
    document.addEventListener("pointerup", up);
  }

  function onDragMove(e){
    if (!dragCtx) return;
    const dy = e.clientY - dragCtx.startY;
    dragCtx.item.style.transform = `translateY(${dy}px)`;
    const rawIndex = dragCtx.startIndex + Math.round(dy / dragCtx.itemHeight);
    const newIndex = Math.max(0, Math.min(dragCtx.items.length - 1, rawIndex));
    if (newIndex !== dragCtx.currentIndex){
      dragCtx.currentIndex = newIndex;
      dragCtx.items.forEach((el, i) => {
        if (el === dragCtx.item) return;
        let shift = 0;
        if (dragCtx.currentIndex > dragCtx.startIndex){
          if (i > dragCtx.startIndex && i <= dragCtx.currentIndex) shift = -dragCtx.itemHeight;
        } else if (dragCtx.currentIndex < dragCtx.startIndex){
          if (i >= dragCtx.currentIndex && i < dragCtx.startIndex) shift = dragCtx.itemHeight;
        }
        el.style.transition = "transform 0.18s cubic-bezier(.2,.8,.2,1)";
        el.style.transform = shift ? `translateY(${shift}px)` : "";
      });
    }
  }

  function onDragEnd(){
    if (!dragCtx) return;
    const { items, startIndex, currentIndex, listRef, commit } = dragCtx;
    const reordered = [...listRef];
    const [moved] = reordered.splice(startIndex, 1);
    reordered.splice(currentIndex, 0, moved);
    items.forEach(el => {
      el.style.transition = ""; el.style.transform = ""; el.style.zIndex = ""; el.style.position = "";
      el.classList.remove("shadow-2xl","ring-1","ring-emerald-500/40");
    });
    if (currentIndex !== startIndex){ sound("select"); vibrate(15); }
    dragCtx = null;
    commit(reordered);
  }

  function getChartPoints(exercise, side){
    const sets = allSets().filter(s => s.exercise === exercise && (s.side || null) === (side || null))
      .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
    const byDate = {};
    sets.forEach(s => { const e1 = epley(s.weight, s.reps); if (!byDate[s.date] || e1 > byDate[s.date]) byDate[s.date] = e1; });
    return Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0])).map(([date,val]) => ({ date, val }));
  }

  function chartSvgMarkup(points, W, H, interactive, idSuffix){
    if (!points.length) return `<div class="text-center text-zinc-600 text-sm py-8">${T.notEnoughData}</div>`;
    const padX = 14, padY = 16;
    const vals = points.map(p => p.val);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max - min) || 1;
    const stepX = points.length > 1 ? (W - padX*2) / (points.length - 1) : 0;
    const coords = points.map((p,i) => ({ x: padX + i*stepX, y: H - padY - ((p.val - min) / range) * (H - padY*2), ...p }));
    const pathD = coords.map((c,i) => (i===0?"M":"L") + c.x.toFixed(1) + "," + c.y.toFixed(1)).join(" ");
    const areaD = pathD + ` L${coords[coords.length-1].x.toFixed(1)},${H-padY} L${coords[0].x.toFixed(1)},${H-padY} Z`;
    const dots = coords.map(c => `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${interactive?4:3.5}" fill="#34d399" stroke="#09090b" stroke-width="1.5" />`).join("");
    const gradId = "chartGrad_" + idSuffix;
    const cursorGroup = interactive ? `<g id="chartCursor_${idSuffix}" style="opacity:0">
        <line x1="0" y1="${padY}" x2="0" y2="${H-padY}" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,3" class="chart-cursor-line"/>
        <circle r="6" fill="#a78bfa" stroke="#09090b" stroke-width="2" />
      </g>` : "";
    const dataAttr = interactive ? `data-points='${JSON.stringify(coords.map(c => ({x:c.x,y:c.y,date:c.date,val:c.val})))}'` : "";
    return `<svg id="chartSvg_${idSuffix}" ${dataAttr} viewBox="0 0 ${W} ${H}" class="w-full ${interactive?'h-56 touch-none':'h-28'}">
      <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/><stop offset="100%" stop-color="#34d399" stop-opacity="0"/></linearGradient></defs>
      <path d="${areaD}" fill="url(#${gradId})" />
      <path d="${pathD}" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      ${dots}
      ${cursorGroup}
    </svg>`;
  }

  function wireChartInteraction(idSuffix, labelElId){
    const svg = document.getElementById("chartSvg_" + idSuffix);
    if (!svg) return;
    const points = JSON.parse(svg.dataset.points || "[]");
    if (!points.length) return;
    const cursorGroup = document.getElementById("chartCursor_" + idSuffix);
    const line = cursorGroup.querySelector("line");
    const dot = cursorGroup.querySelector("circle");
    const label = document.getElementById(labelElId);
    const W = svg.viewBox.baseVal.width;

    function updateAt(clientX){
      const rect = svg.getBoundingClientRect();
      const svgX = ((clientX - rect.left) / rect.width) * W;
      let nearest = points[0], minDist = Infinity;
      points.forEach(p => { const d = Math.abs(p.x - svgX); if (d < minDist){ minDist = d; nearest = p; } });
      line.setAttribute("x1", nearest.x); line.setAttribute("x2", nearest.x);
      dot.setAttribute("cx", nearest.x); dot.setAttribute("cy", nearest.y);
      cursorGroup.style.opacity = "1";
      if (label) label.textContent = fmtDateLabel(nearest.date) + " · " + nearest.val.toFixed(1) + "кг";
    }

    svg.addEventListener("pointerdown", (e) => { svg.setPointerCapture(e.pointerId); updateAt(e.clientX); });
    svg.addEventListener("pointermove", (e) => { updateAt(e.clientX); });
    const last = points[points.length - 1];
    line.setAttribute("x1", last.x); line.setAttribute("x2", last.x);
    dot.setAttribute("cx", last.x); dot.setAttribute("cy", last.y);
    cursorGroup.style.opacity = "1";
    if (label) label.textContent = fmtDateLabel(last.date) + " · " + last.val.toFixed(1) + "кг";
  }

  function renderPhotos(){

      content.innerHTML = addBtn + `<div class="text-center text-zinc-600 text-sm py-10">${T.startPhotoJournal}</div>`;
      return;
    }

    // Most recent photo per date, for the calendar thumbnails.
    const byDate = {};
    [...state.photos].sort((a,b) => a.date.localeCompare(b.date)).forEach(p => { byDate[p.date] = p; });

    const year = ui.photos.viewYear, month = ui.photos.viewMonth;
    const first = new Date(year, month, 1);
    const startOffset = (first.getDay() + 6) % 7;
    const daysInMo = daysInMonth(year, month);
    const totalCells = Math.ceil((startOffset + daysInMo) / 7) * 7;
    const todayIso = todayStr();
    const isRtl = RTL_LANGS.includes(lang);
    const monthLabel = first.toLocaleDateString(LOCALE_TAGS[lang], { month: "long", year: "numeric" });
    const weekdayHeader = DAY_KEYS.map((k,i) => `<div class="text-center text-[11px] font-bold text-zinc-600 py-1">${shortDayName(i)}</div>`).join("");

    let cells = "";
    for (let i = 0; i < totalCells; i++){
      const dayNum = i - startOffset + 1;
      if (dayNum < 1 || dayNum > daysInMo){ cells += `<div></div>`; continue; }
      const dateIso = year + "-" + String(month+1).padStart(2,"0") + "-" + String(dayNum).padStart(2,"0");
      const isToday = dateIso === todayIso;
      const p = byDate[dateIso];
      if (p){
        cells += `
        <button data-action="open-lightbox" data-id="${p.id}" class="tap aspect-square rounded-xl overflow-hidden relative ${isToday ? "ring-2 ring-emerald-500/60" : ""}">

        cells += `
        <div class="aspect-square flex items-center justify-center rounded-xl ${isToday ? "bg-emerald-500/15 ring-2 ring-emerald-500/50" : ""}">
          <span class="text-[13px] font-semibold ${isToday ? "text-emerald-400" : "text-zinc-700"}">${dayNum}</span>
        </div>`;
      }
    }

    content.innerHTML = `

      <div class="flex items-center justify-between mb-4">
        <button data-action="prev-photos-month" class="tap w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-400 active:bg-zinc-800"><i data-lucide="${isRtl?"chevron-right":"chevron-left"}" class="w-5 h-5"></i></button>

  function compressImage(file, maxDim, quality){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxDim){ height = Math.round(height * maxDim/width); width = maxDim; }
          else if (height >= width && height > maxDim){ width = Math.round(width * maxDim/height); height = maxDim; }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

        ${supaUser ? `<button data-action="open-delete-account" class="tap w-full py-3 text-zinc-600 font-semibold text-xs active:text-red-400">${T.deleteAccountBtn}</button>` : ""}
      </div>
    </div>
    ${ui.deleteAccount.open ? renderDeleteAccountConfirmHtml() : ""}`;
    lucide.createIcons();
  }

  function toggleTimerPrompt(){
    state.timerSettings.skipPrompt = !state.timerSettings.skipPrompt;
    saveState(); sound("tap"); renderSettingsModal();
  }
  function toggleTimerEnabled(){
    state.timerSettings.enabled = !state.timerSettings.enabled;
    saveState(); sound("tap");
    if (!state.timerSettings.enabled && ui.timer.active) skipActiveTimer();
    renderSettingsModal();
    renderFab();
  }
  function settingsTimerDelta(delta){
    state.timerSettings.defaultSeconds = Math.max(15, Math.min(600, state.timerSettings.defaultSeconds + delta));
    saveState(); sound("step");
    const el = document.getElementById("settingsTimerDurationText");
    if (el){
      const mm = Math.floor(state.timerSettings.defaultSeconds / 60);
      const ss = state.timerSettings.defaultSeconds % 60;
      el.textContent = String(mm).padStart(2,"0") + ":" + String(ss).padStart(2,"0");
      pulse(el);
    } else renderSettingsModal();
  }

  /* ---------------------------------------------------------------------
     Delete Account
  --------------------------------------------------------------------- */
  function openDeleteAccount(){
    sound("tap");
    ui.deleteAccount = { open: true, busy: false, error: "" };
    renderSettingsModal();
  }
  function closeDeleteAccount(){
    ui.deleteAccount = { open: false, busy: false, error: "" };
    renderSettingsModal();
  }

  function renderDeleteAccountConfirmHtml(){
    const d = ui.deleteAccount;
    return `
    <div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
      <div data-action="close-delete-account" class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
      <div class="anim-sheet relative w-full sm:max-w-sm bg-zinc-950 border border-red-500/30 rounded-t-3xl sm:rounded-3xl p-5 pb-8 space-y-4">
        <div class="flex items-center gap-2.5 text-red-400"><i data-lucide="triangle-alert" class="w-5 h-5"></i><div class="font-bold text-lg">${T.deleteAccountBtn}</div></div>
        <div class="text-sm text-zinc-400 leading-relaxed">${escapeHtml(T.deleteAccountWarning)}</div>
        <input id="deleteAccountPasswordInput" type="password" placeholder="${T.passwordPlaceholder}" class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-4 text-[15px] text-white placeholder-zinc-600 outline-none focus:border-red-500/50" />
        ${d.error ? `<div class="text-sm text-red-400 font-semibold">${escapeHtml(d.error)}</div>` : ""}
        <div class="flex gap-2.5">
          <button data-action="close-delete-account" class="tap flex-1 py-4 rounded-2xl bg-zinc-800 text-zinc-300 font-bold text-[15px] active:bg-zinc-700">${T.cancelBtn}</button>
          <button data-action="confirm-delete-account" ${d.busy ? "disabled" : ""} class="tap flex-1 py-4 rounded-2xl bg-red-500 text-white font-extrabold text-[15px] active:bg-red-400 disabled:opacity-60">${T.deleteAccountConfirmBtn}</button>
        </div>
      </div>
    </div>`;
  }

  async function confirmDeleteAccount(){
    if (!sb || !supaUser) return;
    const password = document.getElementById("deleteAccountPasswordInput").value || "";
    if (!password){ ui.deleteAccount.error = T.authFillBoth; renderSettingsModal(); return; }
    ui.deleteAccount.busy = true; ui.deleteAccount.error = ""; renderSettingsModal();
    try {
      const { error: authError } = await sb.auth.signInWithPassword({ email: supaUser.email, password });
      if (authError) throw new Error(T.deleteAccountWrongPassword);
      const { error: fnError } = await sb.functions.invoke("delete-account", { method: "POST" });
      if (fnError) throw fnError;
      const userId = supaUser.id;
      await sb.auth.signOut();
      supaUser = null;
      state = defaultState();
      localStorage.removeItem(STORAGE_KEY);
      ui.deleteAccount = { open: false, busy: false, error: "" };
      ui.settingsOpen = false;
      document.getElementById("modalHost").innerHTML = "";
      sound("delete");
      render();
      renderGate();
    } catch(e){
      ui.deleteAccount.busy = false;
      ui.deleteAccount.error = e.message || String(e);
      renderSettingsModal();
    }
  }

  /* ---------------------------------------------------------------------
     iOS-style Rest Timer Picker
  --------------------------------------------------------------------- */
  function openTimerPicker(){
    ui.pickerOpen = true;
    const total = state.timerSettings.defaultSeconds;
    ui.pickerMinutes = Math.floor(total / 60);
    ui.pickerSeconds = SECOND_VALUES.reduce((closest, v) => Math.abs(v - total%60) < Math.abs(closest - total%60) ? v : closest, 0);
    renderTimerPickerModal();
  }
  function closeTimerPicker(){ ui.pickerOpen = false; document.getElementById("modalHost").innerHTML = ""; }

  function renderTimerPickerModal(){
    const host = document.getElementById("modalHost");
    const minCol = MINUTE_VALUES.map(v => `<div class="picker-item" data-value="${v}">${v}</div>`).join("");
    const secCol = SECOND_VALUES.map(v => `<div class="picker-item" data-value="${v}">${String(v).padStart(2,"0")}</div>`).join("");
    host.innerHTML = `
    <div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
      <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
      <div class="anim-sheet relative w-full sm:max-w-sm bg-zinc-950 border border-zinc-800 rounded-t-3xl sm:rounded-3xl p-5 pb-8">
        <div class="text-center mb-1">
          <div class="w-10 h-1 bg-zinc-700 rounded-full mx-auto mb-4 sm:hidden"></div>
          <div class="font-bold text-lg text-zinc-100">${T.restBetweenSets}</div>
        </div>
        <div class="relative h-44 flex justify-center items-center gap-3 mt-3">
          <div class="absolute left-0 right-0 top-1/2 -translate-y-1/2 h-11 bg-zinc-800/60 rounded-2xl pointer-events-none"></div>
          <div id="pickerMin" class="picker-col w-16 text-center"><div style="height:66px"></div>${minCol}<div style="height:66px"></div></div>
          <div class="text-zinc-500 font-bold text-lg">${T.minShort}</div>
          <div id="pickerSec" class="picker-col w-16 text-center"><div style="height:66px"></div>${secCol}<div style="height:66px"></div></div>
          <div class="text-zinc-500 font-bold text-lg">${T.secShort}</div>
        </div>
        <label class="flex items-center gap-3 mt-4 mb-5 px-1 py-1 cursor-pointer">
          <input id="pickerSkipCheckbox" type="checkbox" data-field="picker-skip" class="w-6 h-6 rounded-md accent-emerald-500" />
          <span class="text-[15px] text-zinc-400 font-medium">${T.dontAskAgain}</span>
        </label>
        <div class="flex gap-2.5">
          <button data-action="skip-timer" class="tap flex-1 py-4 rounded-2xl bg-zinc-800 text-zinc-300 font-bold text-[15px] active:bg-zinc-700">${T.noRestBtn}</button>
          <button data-action="start-timer" class="tap flex-1 py-4 rounded-2xl bg-emerald-500 text-zinc-950 font-extrabold text-[15px] active:bg-emerald-400">${T.startBtn}</button>
        </div>
      </div>
    </div>`;
    lucide.createIcons();

    const minColEl = document.getElementById("pickerMin");
    const secColEl = document.getElementById("pickerSec");
    minColEl.scrollTop = MINUTE_VALUES.indexOf(ui.pickerMinutes) * PICKER_ITEM_H;
    secColEl.scrollTop = SECOND_VALUES.indexOf(ui.pickerSeconds) * PICKER_ITEM_H;

    let minT, secT;
    minColEl.addEventListener("scroll", () => {
      clearTimeout(minT);
      minT = setTimeout(() => {
        const idx = Math.round(minColEl.scrollTop / PICKER_ITEM_H);
        ui.pickerMinutes = MINUTE_VALUES[Math.max(0, Math.min(MINUTE_VALUES.length-1, idx))];
        sound("step");
      }, 120);
    });
    secColEl.addEventListener("scroll", () => {
      clearTimeout(secT);
      secT = setTimeout(() => {
        const idx = Math.round(secColEl.scrollTop / PICKER_ITEM_H);
        ui.pickerSeconds = SECOND_VALUES[Math.max(0, Math.min(SECOND_VALUES.length-1, idx))];
        sound("step");
      }, 120);
    });
  }

  function startTimerFromPicker(){
    const total = ui.pickerMinutes*60 + ui.pickerSeconds;
    const skip = document.getElementById("pickerSkipCheckbox").checked;
    state.timerSettings.defaultSeconds = Math.max(15, total || 15);
    state.timerSettings.skipPrompt = skip;
    saveState();
    closeTimerPicker();
    if (total > 0) startRestTimer(total); else startRestTimer(state.timerSettings.defaultSeconds);
  }
  function skipTimerFromPicker(){ closeTimerPicker(); }

  /* ---------------------------------------------------------------------
     Rest Timer Engine
  --------------------------------------------------------------------- */
  function clearRestTimerInterval(){ if (timerIntervalId){ clearInterval(timerIntervalId); timerIntervalId = null; } }

  function manualStartTimer(){
    if (!state.timerSettings.enabled) return;
    sound("tap");
    if (state.timerSettings.skipPrompt) startRestTimer(state.timerSettings.defaultSeconds);
    else openTimerPicker();
  }

  function startRestTimer(seconds){
    clearRestTimerInterval();
    const endsAt = Date.now() + seconds*1000;
    ui.timer = { active: true, total: seconds, remaining: seconds, endsAt, expanded: true };
    localStorage.setItem(TIMER_KEY, JSON.stringify({ endsAt, total: seconds }));
    timerIntervalId = setInterval(tickTimer, 250);
    renderTimer();
    renderFab();
  }

  function tickTimer(){
    if (!ui.timer.active) return;
    const remaining = Math.max(0, Math.round((ui.timer.endsAt - Date.now()) / 1000));
    ui.timer.remaining = remaining;
    updateTimerDom();
    if (remaining <= 0) finishTimer();
  }

  function finishTimer(){
    clearRestTimerInterval();
    ui.timer.active = false;
    localStorage.removeItem(TIMER_KEY);
    sound("timerDone");
    vibrate([30,60,30,60,30]);
    renderTimer();
    renderFab();
    lucide.createIcons();
    showToast(T.restOverToast, "pr");
  }

  function expandTimer(){ ui.timer.expanded = true; renderTimer(); }
  function collapseTimer(){ ui.timer.expanded = false; renderTimer(); }

  function adjustTimer(delta){
    ui.timer.endsAt += delta*1000;
    ui.timer.remaining = Math.max(0, Math.round((ui.timer.endsAt - Date.now())/1000));
    localStorage.setItem(TIMER_KEY, JSON.stringify({ endsAt: ui.timer.endsAt, total: ui.timer.total }));
    sound("step"); vibrate(8);
    updateTimerDom();
  }

  function skipActiveTimer(){
    clearRestTimerInterval();
    ui.timer.active = false;
    localStorage.removeItem(TIMER_KEY);
    sound("tap");
    renderTimer();
    renderFab();
    lucide.createIcons();
  }

  function renderTimer(){
    const host = document.getElementById("timerHost");
    if (!ui.timer.active){ host.innerHTML = ""; return; }
    const r = 26, c = 2*Math.PI*r;
    if (ui.timer.expanded){
      host.innerHTML = `
      <div class="fixed inset-0 z-40 flex items-end sm:items-center justify-center">
        <div data-action="collapse-timer" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="anim-sheet relative w-full sm:max-w-sm bg-zinc-950 border border-zinc-800 rounded-t-3xl sm:rounded-3xl p-6 pb-10 flex flex-col items-center">
          <div class="text-sm font-bold text-zinc-500 mb-4 tracking-wider">${T.restLabel}</div>
          <div class="relative w-48 h-48 mb-6">
            <svg viewBox="0 0 60 60" class="w-full h-full -rotate-90">
              <circle cx="30" cy="30" r="${r}" fill="none" stroke="#27272a" stroke-width="4" />
              <circle id="timerRingFg" cx="30" cy="30" r="${r}" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="0" />
            </svg>
            <div class="absolute inset-0 flex items-center justify-center"><span id="timerTimeText" class="text-4xl font-extrabold text-white tabular-nums">00:00</span></div>
          </div>
          <div class="flex items-center gap-3 mb-2">
            <button data-action="adjust-timer" data-delta="-15" class="tap px-5 py-3 rounded-2xl bg-zinc-800 text-zinc-200 font-bold text-[15px] active:bg-zinc-700">−15${T.secShort}</button>
            <button data-action="skip-active-timer" class="tap px-6 py-3 rounded-2xl bg-zinc-800 text-red-400 font-bold text-[15px] active:bg-zinc-700">${T.skipBtn}</button>
            <button data-action="adjust-timer" data-delta="15" class="tap px-5 py-3 rounded-2xl bg-zinc-800 text-zinc-200 font-bold text-[15px] active:bg-zinc-700">+15${T.secShort}</button>
          </div>
          <button data-action="collapse-timer" class="tap text-sm text-zinc-600 mt-3 py-2 px-4 active:text-zinc-400">${T.collapseBtn}</button>
        </div>
      </div>`;
    } else {
      const offset = navHeight() + 12;
      host.innerHTML = `
      <div data-action="expand-timer" style="bottom:${offset}px" class="tap fixed left-1/2 -translate-x-1/2 z-30 flex items-center gap-3 bg-zinc-900/95 backdrop-blur border border-zinc-800 rounded-full ps-2.5 pe-2.5 py-2.5 shadow-2xl cursor-pointer">
        <div class="relative w-10 h-10 shrink-0">
          <svg viewBox="0 0 60 60" class="w-full h-full -rotate-90">
            <circle cx="30" cy="30" r="${r}" fill="none" stroke="#27272a" stroke-width="6" />
            <circle id="timerRingFgMini" cx="30" cy="30" r="${r}" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="0" />
          </svg>
        </div>
        <span id="timerTimeTextMini" class="text-base font-extrabold text-white tabular-nums">00:00</span>
        <button data-action="skip-active-timer" class="tap w-8 h-8 rounded-full flex items-center justify-center text-zinc-500 shrink-0 active:bg-zinc-800"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>`;
    }
    lucide.createIcons();
    updateTimerDom();
  }

  function updateTimerDom(){
    if (!ui.timer.active) return;
    const r = 26, c = 2*Math.PI*r;
    const frac = ui.timer.total > 0 ? Math.max(0, Math.min(1, ui.timer.remaining / ui.timer.total)) : 0;
    const offset = c * (1 - frac);
    const mm = String(Math.floor(ui.timer.remaining/60)).padStart(2,"0");
    const ss = String(ui.timer.remaining%60).padStart(2,"0");
    const timeStr = mm + ":" + ss;
    ["timerRingFg","timerRingFgMini"].forEach(id => { const el = document.getElementById(id); if (el) el.setAttribute("stroke-dashoffset", offset.toFixed(2)); });
    ["timerTimeText","timerTimeTextMini"].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = timeStr; });
  }

  /* ---------------------------------------------------------------------
     Event Delegation
  --------------------------------------------------------------------- */
  const app = document.getElementById("app");

  app.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;
    const a = btn.dataset;
    switch(a.action){
      case "switch-tab": switchTab(a.tab); break;
      case "open-exercise": openExercise(a.exercise); break;
      case "nav-back": navBack(); break;
      case "step-weight": stepWeight(parseFloat(a.delta)); break;
      case "step-reps": stepReps(parseInt(a.delta)); break;
      case "step-weight-side": stepWeightSide(a.side, parseFloat(a.delta)); break;
      case "step-reps-side": stepRepsSide(a.side, parseInt(a.delta)); break;
      case "toggle-rpe": ui.workout.rpeOpen = !ui.workout.rpeOpen; sound("tap"); render(); break;
      case "toggle-split-sides": toggleSplitSides(); break;
      case "log-set": logSet(); break;
      case "delete-set": deleteSet(a.session, a.set); break;
      case "toggle-quick-add": toggleQuickAdd(); break;
      case "quick-add-exercise": quickAddExercise(); break;
      case "open-day": openDay(a.date); break;
      case "prev-month": prevMonth(); break;
      case "next-month": nextMonth(); break;
      case "toggle-day-active": toggleDayActive(a.day); break;
      case "add-day-exercise": addDayExercise(a.day); break;
      case "remove-day-exercise": removeDayExercise(a.day, parseInt(a.index)); break;
      case "save-template": saveTemplate(); break;
      case "close-template-modal": closeTemplateModal(); break;
      case "confirm-save-template": confirmSaveTemplate(); break;
      case "open-templates": openTemplates(); break;
      case "close-templates-modal": closeTemplatesModal(); break;
      case "apply-template": ui.quickFill.open ? applyQuickFillTemplate(a.id) : applyTemplate(a.id); break;
      case "delete-template": deleteTemplate(a.id); break;
      case "open-quickfill": openQuickFill(); break;
      case "close-quickfill": closeQuickFill(); break;
      case "toggle-qf-weekday": toggleQuickFillWeekday(parseInt(a.idx)); break;
      case "add-qf-exercise": addQuickFillExercise(); break;
      case "remove-qf-exercise": removeQuickFillExercise(parseInt(a.idx)); break;
      case "qf-months-delta": quickFillMonthsDelta(parseInt(a.delta)); break;
      case "confirm-quickfill": confirmQuickFill(); break;
      case "open-chart": openChart(a.exercise, a.side); break;
      case "close-chart": closeChart(); break;
      case "open-add-photo": openAddPhoto(); break;
      case "close-add-photo": closeAddPhoto(); break;
      case "save-photo": savePhoto(); break;
      case "open-lightbox": openLightbox(a.id); break;
      case "close-lightbox": closeLightbox(); break;
      case "delete-photo": deletePhoto(a.id); break;
      case "prev-photos-month": prevPhotosMonth(); break;
      case "next-photos-month": nextPhotosMonth(); break;
      case "open-settings": openSettings(); break;
      case "close-settings": closeSettings(); break;
      case "open-avatar-preview": openAvatarPreview(); break;
      case "close-avatar-preview": closeAvatarPreview(); break;
      case "toggle-app-sound": toggleAppSound(); break;
      case "toggle-timer-prompt": toggleTimerPrompt(); break;
      case "toggle-timer-enabled": toggleTimerEnabled(); break;
      case "settings-timer-delta": settingsTimerDelta(parseInt(a.delta)); break;
      case "open-delete-account": openDeleteAccount(); break;
      case "close-delete-account": closeDeleteAccount(); break;
      case "confirm-delete-account": confirmDeleteAccount(); break;
      case "start-timer": startTimerFromPicker(); break;
      case "skip-timer": skipTimerFromPicker(); break;
      case "expand-timer": expandTimer(); break;
      case "collapse-timer": collapseTimer(); break;
      case "adjust-timer": adjustTimer(parseInt(a.delta)); break;
      case "skip-active-timer": skipActiveTimer(); break;
      case "manual-timer": manualStartTimer(); break;
      case "goto-today-schedule": gotoTodaySchedule(); break;
      case "pick-exercise-image": pickExerciseImage(a.exercise); break;
      case "edit-note": editNote(); break;
      case "close-note-modal": closeNoteModal(); break;
      case "save-note": saveNoteFromModal(); break;
      case "delete-note": deleteNote(); break;
      case "open-image-lightbox": openImageLightbox(a.exercise); break;
      case "close-image-lightbox": closeImageLightbox(); break;
      case "submit-auth": submitAuth(); break;
      case "toggle-auth-mode": toggleAuthMode(); break;
      case "open-birthdate-picker": openBirthDatePicker(); break;
      case "close-birthdate-picker": closeBirthDatePicker(); break;
      case "confirm-birthdate": confirmBirthDate(); break;
      case "sign-out-cloud": signOutCloud(); break;
    }
  });

  app.addEventListener("pointerdown", (e) => {
    const handle = e.target.closest("[data-drag-handle]");
    if (!handle) return;
    e.preventDefault();
    startDrag(e, handle);
  });

  app.addEventListener("input", (e) => {
    const field = e.target.dataset.field;
    if (field === "weight") ui.weight = parseFloat(e.target.value) || 0;
    else if (field === "reps") ui.reps = parseInt(e.target.value) || 0;
    else if (field === "weightL") ui.weightL = parseFloat(e.target.value) || 0;
    else if (field === "weightR") ui.weightR = parseFloat(e.target.value) || 0;
    else if (field === "repsL") ui.repsL = parseInt(e.target.value) || 0;
    else if (field === "repsR") ui.repsR = parseInt(e.target.value) || 0;
    else if (field === "rpe"){
      ui.rpe = parseFloat(e.target.value);
      const label = document.getElementById("rpeValueLabel"); if (label) label.textContent = ui.rpe;
      const hint = document.getElementById("rpeHint"); if (hint) hint.textContent = rpeHintText(ui.rpe);
    }
    else if (field === "photo-weight") ui.photos.weightDraft = e.target.value;
    else if (field === "photo-date") ui.photos.dateDraft = e.target.value;
    else if (field === "sound-volume") setSoundVolume(parseInt(e.target.value) / 100);
  });

  app.addEventListener("change", (e) => {
    if (e.target.id === "photoFileInput"){
      const file = e.target.files[0];
      if (!file) return;
      compressImage(file, 900, 0.72).then(dataUrl => {
        ui.photos.draftImage = dataUrl;
        if (ui.photos.adding) renderAddPhotoModal();
      }).catch(() => showToast(T.photoLoadFailed, "warn"));
    } else if (e.target.id === "exerciseImageInput"){
      const file = e.target.files[0];
      e.target.value = "";
      if (!file || !ui.pendingImageExercise) return;
      compressImage(file, 600, 0.75).then(dataUrl => {
        state.exerciseImages[ui.pendingImageExercise] = dataUrl;
        saveState(); sound("log");
        render();
      }).catch(() => showToast(T.photoLoadFailed, "warn"));
    } else if (e.target.id === "languageSelect"){
      setLanguage(e.target.value);
      if (ui.settingsOpen) renderSettingsModal();
    } else if (e.target.id === "soundVolumeSlider"){
      sound("tap");
    }
  });

  app.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const field = e.target.dataset.field;
    if (field === "weight" || field === "reps" || field === "weightL" || field === "weightR" || field === "repsL" || field === "repsR"){ e.preventDefault(); logSet(); }
    else if (field === "new-day-exercise"){ e.preventDefault(); addDayExercise(ui.schedule.activeDate); }
    else if (field === "quickfill-exercise"){ e.preventDefault(); addQuickFillExercise(); }
    else if (field === "quick-add-exercise"){ e.preventDefault(); quickAddExercise(); }
    else if (field === "template-name"){ e.preventDefault(); confirmSaveTemplate(); }
    else if (field === "auth-email" || field === "auth-password" || field === "auth-password2" || field === "auth-firstname" || field === "auth-lastname" || field === "auth-birthdate"){ e.preventDefault(); submitAuth(); }
  });

  /* ---------------------------------------------------------------------
     Init
  --------------------------------------------------------------------- */
  function init(){
    applyLangDom();
    const savedTimer = localStorage.getItem(TIMER_KEY);
    if (savedTimer){
      try {
        const { endsAt, total } = JSON.parse(savedTimer);
        if (endsAt > Date.now()){
          ui.timer = { active: true, total, endsAt, expanded: false, remaining: Math.round((endsAt-Date.now())/1000) };
          timerIntervalId = setInterval(tickTimer, 250);
        } else {
          localStorage.removeItem(TIMER_KEY);
        }
      } catch(e){ localStorage.removeItem(TIMER_KEY); }
    }
    render();
    renderTimer();
    initAuth();
  }

  init();
})();
</script>
</body>
</html>
